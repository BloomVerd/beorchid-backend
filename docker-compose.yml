services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beorchid
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - beorchid-network

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beorchid-network

  beorchid-backend:
    image: fkaaziebu/beorchid-backend
    container_name: beorchid-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '4000:4000'
    networks:
      - beorchid-network

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ollama
    restart: unless-stopped
    # Ollama is NOT published to the host directly — only nginx can reach it
    # over the internal network. Clients go through the API-key gateway.
    expose:
      - '11434'
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - beorchid-network
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    # GPU support: uncomment on a GPU-backed EC2 instance (g4dn/g5) with the
    # NVIDIA Container Toolkit installed. Harmless to leave commented on CPU.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  model-init:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:?OLLAMA_MODEL is required}
    entrypoint: ['/bin/sh', '-c']
    command:
      - 'ollama pull "$${OLLAMA_MODEL}"'
    networks:
      - beorchid-network
    restart: 'no'

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/postgres-data

  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/redis-data

  ollama-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/ollama-models

networks:
  beorchid-network:
    driver: bridge
