name: BEORCHID CD

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    permissions:
      actions: read
      contents: read

    env:
      COMPOSE_PROJECT_NAME: beorchid-backend

    steps:
      - name: Check latest CI passed on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow ci.yml \
            --branch main \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest CI conclusion: $STATUS"
          if [ "$STATUS" != "success" ]; then
            echo "Latest CI run on main did not succeed (status: $STATUS). Aborting deploy."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare EC2 directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/beorchid-backend
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} ~/beorchid-backend

      - name: Prepare ollama EC2 directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OLLAMA_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_IP }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/ollama
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} ~/ollama

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'docker-compose.yml'
          target: '~/beorchid-backend'
          overwrite: true

      - name: Copy docker-compose.ollama.yml to Ollama server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OLLAMA_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_IP }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          source: 'docker-compose.ollama.yml'
          target: '~/ollama'
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: COMPOSE_PROJECT_NAME
          script: |
            set -e

            echo "========================================="
            echo "  Starting BEORCHID Deployment"
            echo "  Commit: ${{ github.sha }}"
            echo "  Time:   $(date)"
            echo "========================================="

            # ── 1. Ensure working directory exists ───────────────────────────
            mkdir -p ~/beorchid-backend && cd ~/beorchid-backend

            # ── 2. Install Docker only if missing ────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "[1/5] Installing Docker..."
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ${{ secrets.EC2_USER }}
              echo "Docker installed successfully."
            else
              echo "[1/5] Docker already installed: $(docker --version)"
              sudo systemctl start docker || true
            fi

            # ── 3. Install Docker Compose only if missing ─────────────────────
            if ! docker compose version &> /dev/null; then
              echo "[2/5] Installing Docker Compose..."
              sudo mkdir -p /usr/libexec/docker/cli-plugins
              sudo curl -fsSL \
                https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) \
                -o /usr/libexec/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
              echo "Docker Compose installed: $(docker compose version)"
            else
              echo "[2/5] Docker Compose already installed: $(docker compose version)"
            fi

            # ── 4. Write configuration files ──────────────────────────────────
            echo "[3/5] Writing configuration files..."

            echo "${{ secrets.ENV_FILE }}" > .env

            # ── 5. Pull latest images ──────────────────────────────────────────
            echo "[4/5] Pulling latest Docker images..."
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} docker compose pull

            # ── 6. Deploy with zero volume disruption ─────────────────────────
            echo "[5/5] Deploying containers..."

            # Bring down only app containers — volumes are intentionally untouched
            # NOTE: Never use 'docker compose down -v' as it destroys postgres_data
            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} \
              docker compose down --remove-orphans --timeout 30

            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} \
              docker compose up -d

            # ── 7. Prune unused images to free disk space ──────────────────────
            echo "Pruning unused images..."
            docker image prune -f

            # ── 8. Health check ───────────────────────────────────────────────
            echo "Waiting for containers to be healthy..."
            sleep 10

            COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }} docker compose ps

            echo "Verifying postgres volume..."
            docker volume inspect ${COMPOSE_PROJECT_NAME}_postgres_data \
              && echo "✅ postgres_data volume is intact" \
              || echo "⚠️  Warning: postgres_data volume not found"

            echo "Disk usage:"
            df -h /

            echo "========================================="
            echo "  Deployment Complete ✅"
            echo "========================================="

      - name: Deploy to Ollama server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OLLAMA_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_IP }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          envs: COMPOSE_PROJECT_NAME
          script: |
            set -e

            echo "========================================="
            echo "  Starting OLLAMA Deployment"
            echo "  Commit: ${{ github.sha }}"
            echo "  Time:   $(date)"
            echo "========================================="

            # ── 1. Ensure working directory exists ───────────────────────────
            mkdir -p ~/ollama && cd ~/ollama
            mv -f docker-compose.ollama.yml docker-compose.yml

            # ── 2. Install Docker only if missing ────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "[1/5] Installing Docker..."
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ${{ secrets.EC2_USER }}
              echo "Docker installed successfully."
            else
              echo "[1/5] Docker already installed: $(docker --version)"
              sudo systemctl start docker || true
            fi

            # ── 3. Install Docker Compose only if missing ─────────────────────
            if ! docker compose version &> /dev/null; then
              echo "[2/5] Installing Docker Compose..."
              sudo mkdir -p /usr/libexec/docker/cli-plugins
              sudo curl -fsSL \
                https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) \
                -o /usr/libexec/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
              echo "Docker Compose installed: $(docker compose version)"
            else
              echo "[2/5] Docker Compose already installed: $(docker compose version)"
            fi

            # ── 4. Write configuration files ──────────────────────────────────
            echo "[3/5] Writing configuration files..."

            echo "${{ secrets.ENV_FILE }}" > .env

            # ── 5. Pull latest images ──────────────────────────────────────────
            echo "[4/5] Pulling latest Docker images..."
            COMPOSE_PROJECT_NAME=ollama docker compose pull

            # ── 6. Deploy with zero volume disruption ─────────────────────────
            echo "[5/5] Deploying containers..."

            # Bring down only app containers — volumes are intentionally untouched
            # NOTE: Never use 'docker compose down -v' as it destroys ollama-models
            COMPOSE_PROJECT_NAME=ollama \
              docker compose down --remove-orphans --timeout 30

            COMPOSE_PROJECT_NAME=ollama \
              docker compose up -d

            # ── 7. Prune unused images to free disk space ──────────────────────
            echo "Pruning unused images..."
            docker image prune -f

            # ── 8. Health check ───────────────────────────────────────────────
            echo "Waiting for containers to be healthy..."
            sleep 10

            COMPOSE_PROJECT_NAME=ollama docker compose ps

            echo "Verifying postgres volume..."
            docker volume inspect ollama_ollama-models \
              && echo "✅ ollama-models volume is intact" \
              || echo "⚠️  Warning: ollama-models volume not found"

            echo "Disk usage:"
            df -h /

            echo "========================================="
            echo "  Deployment Complete ✅"
            echo "========================================="
